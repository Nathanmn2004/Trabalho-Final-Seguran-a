networks:
  attack_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

services:
  attacker_1:
    build: .
    volumes:
      - ./wordlist.txt:/app/wordlist.txt
    environment:
      - TOTAL_ATTACKERS=20
      - ATTACKER_INDEX=0
      - SERVER_URL=${SERVER_URL}
      - ATTACKER_ID=1
      - MODE=hybrid
      - WORDLIST_PATH=/app/wordlist.txt
    networks:
      attack_net:
        ipv4_address: 172.21.0.21

